  <script>
const RANDOM_QUOTE_API_URL = 'https://api.quotable.io/random?minLength=130&maxLength=168'
const quoteDisplayElement = document.getElementById('quoteDisplay')
function getRandomQuote() {
  return fetch(RANDOM_QUOTE_API_URL)
    .then(response => response.json())
    .then(data => data.content)
}
async function renderNewQuote() {
  const quote = await getRandomQuote()
  quoteDisplayElement.innerHTML = ''
  const characters = quote.split('').map((char) => {
		const span = document.createElement('span')
		span.innerText = char
		quoteDisplayElement.appendChild(span)
		return span
	})
  let cursorIndex = 0;
	let cursorCharacter = characters[cursorIndex]
	cursorCharacter.classList.add('cursor')
  let typeCorrect = 0;
  let typeSum = 0;
  let startTime = null;
  let endTime = null;
  const keydown = ({ key }) => {
    if (!startTime) {
      startTime = new Date()
    }
    if (event.key === cursorCharacter.innerText) {
      cursorCharacter.classList.add('correct') 
      cursorCharacter.classList.remove('cursor') 
      cursorCharacter = characters[++cursorIndex]
      ++typeCorrect;
      ++typeSum;
    } else if (event.key === "Backspace" || event.key === "Delete") {
      if (cursorIndex > 0) {
        cursorCharacter.classList.remove('cursor')
        cursorCharacter = characters[--cursorIndex];
        cursorCharacter.classList.remove('correct')
        cursorCharacter.classList.remove('incorrect')
      }
    } else if (event.key === "Shift") {
      cursorCharacter = characters[cursorIndex];   
    } else {
      cursorCharacter.classList.add('incorrect') 
      cursorCharacter.classList.remove('cursor') 
      cursorCharacter = characters[++cursorIndex];
      ++typeSum;
    }
    if (cursorIndex >= characters.length) {
      renderNewQuote()
      endTime = new Date()
      const delta = endTime - startTime;
      const seconds = delta / 1000;
      const numberOfWords = quote.split(' ').length;
      const wps = numberOfWords / seconds;
      const wpm = wps * 60.0;
      document.getElementById('stats').innerText = Math.round(wpm)
      const accuracy = typeCorrect / typeSum * 100;
      document.getElementById('accuracy').innerText = Math.round(accuracy)
      document.removeEventListener('keydown', keydown)
      return;
    }
    let divisions = 102 / characters.length
    document.getElementById('dynamicBar').style.width = divisions * cursorIndex + '%'
    document.getElementById('dynamicBar').style.animationTimingFunction = "ease";
    cursorCharacter.classList.add('cursor')
  }
  document.addEventListener('keydown', keydown)
}
renderNewQuote()
</script>
